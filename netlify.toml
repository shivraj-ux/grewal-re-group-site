# Netlify config — Grewal RE Group landing page
# Brotli + auto-image-optimization + global edge CDN included on free tier.

[build]
  publish = "."
  # Internal files must not ship in the publish output. CLAUDE.md is the
  # internal editorial policy (was being served at /CLAUDE.md), the competitor
  # log is internal research, and _TEMPLATE files are scaffolding.
  command = "rm -rf archive && rm -f CLAUDE.md data/competitor-log.json data/site-audit.json data/seo-config.json blog/_TEMPLATE_ENHANCED.html"

# ── Cache headers ────────────────────────────────────────────
# HTML: never cache long (must reflect new edits instantly)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets: cache for a year (immutable — change filename to bust)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Gated lead-asset PDFs: keep out of search indexes (robots.txt also disallows)
[[headers]]
  for = "/assets/guides/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# JS/CSS are referenced by stable URLs (query-param versioning is easy to
# forget), so keep them on a short cache — they're a few KB each.
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"

# Logos occasionally get re-optimized under the same filename.
[[headers]]
  for = "/assets/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# AI crawler files: short cache so updates propagate fast
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/sitemap-index.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/sitemap-images.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/llms-full.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/.well-known/security.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

# Every markdown file (SOURCES.md, AGENTS.md, index.md, and the per-page
# renderings under /blog/*.md, /communities/*.md, /calculators/*.md, etc.):
# served as text/markdown so both browsers and AI agents render it correctly.
[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# ── Security headers (good defaults) ─────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.google-analytics.com https://*.googletagmanager.com https://www.google.com; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com; frame-src 'self' https://www.google.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"
    Content-Signal = "search=yes, ai-input=yes, ai-train=no"

# ── MCP server (Netlify Function) ────────────────────────────
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Markdown content negotiation at the edge (Accept: text/markdown -> sibling .md).
# Covers every page; the function itself falls through to normal HTML if no
# .md has been published yet for that path, so this is safe to bind broadly.
[[edge_functions]]
  function = "markdown-negotiation"
  path = "/*"
  excludedPath = ["/assets/*", "/.netlify/*", "/mcp", "/.well-known/*"]

# Clean public endpoint for the MCP server. Rewrite (200) keeps the URL at /mcp.
[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

# The MCP discovery card is served as a STATIC file at /.well-known/mcp-server-card
# (and .json) -- no redirect, so it works even if the function is mid-deploy.

# ── Agent-readiness file content types ───────────────────────
[[headers]]
  for = "/.well-known/mcp-server-card"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/openapi.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

# ── Redirects ────────────────────────────────────────────────

# Static MCP card aliases (.json + /agents.json) for agent-readiness scanners
[[headers]]
  for = "/.well-known/mcp-server-card.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/agents.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"
