# Netlify config — Grewal RE Group landing page
# Brotli + auto-image-optimization + global edge CDN included on free tier.

[build]
  publish = "."

# ── Cache headers ────────────────────────────────────────────
# HTML: never cache long (must reflect new edits instantly)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets: cache for a year (immutable — change filename to bust)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JS/CSS are referenced by stable URLs (query-param versioning is easy to
# forget), so keep them on a short cache — they're a few KB each.
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"

# Logos occasionally get re-optimized under the same filename.
[[headers]]
  for = "/assets/logos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# AI crawler files: short cache so updates propagate fast
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=300"
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

# SOURCES.md: serve as plain text so browsers render it
[[headers]]
  for = "/SOURCES.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# ── Security headers (good defaults) ─────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# ── MCP server (Netlify Function) ────────────────────────────
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Markdown content negotiation at the edge (Accept: text/markdown -> index.md)
[[edge_functions]]
  function = "markdown-negotiation"
  path = "/"

# Clean public endpoint for the MCP server. Rewrite (200) keeps the URL at /mcp.
[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200
  force = true

# The MCP discovery card is served as a STATIC file at /.well-known/mcp-server-card
# (and .json) -- no redirect, so it works even if the function is mid-deploy.

# ── Agent-readiness file content types ───────────────────────
[[headers]]
  for = "/.well-known/mcp-server-card"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/openapi.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/AGENTS.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# ── Redirects ────────────────────────────────────────────────

# Static MCP card aliases (.json + /agents.json) for agent-readiness scanners
[[headers]]
  for = "/.well-known/mcp-server-card.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/agents.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"
