name: Nightly Build Report

# Deterministic nightly status email for grewalregroup.com.
# No LLM: it only emails real git commits + real HTTP status codes.
# Sends via Resend (API key, no SMTP/app-password).

on:
  schedule:
    # 07:00 UTC ~= 02:00 America/Chicago during CDT (summer); 01:00 during CST (winter).
    - cron: '0 7 * * *'
  workflow_dispatch: {}   # Actions tab -> Run workflow, to test on demand

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for git log)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate report
        run: |
          python3 scripts/daily-report.py > report.txt
          echo "----- report preview -----"
          cat report.txt

      - name: Email the report via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 scripts/send-report.py
